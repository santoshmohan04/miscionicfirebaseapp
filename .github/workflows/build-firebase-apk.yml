name: Build and Deploy to Firebase

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type (debug, release, bundle)'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - release
          - bundle

env:
  NODE_VERSION: '18'
  JAVA_VERSION: '21'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'adopt'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          echo "Installing Android SDK components..."
          sdkmanager --install \
            "platforms;android-34" \
            "platforms;android-33" \
            "build-tools;34.0.0" \
            "ndk;26.1.10909125"

      - name: Configure Google Services
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" > android/app/google-services.json
          if [ ! -f android/app/google-services.json ]; then
            echo "ERROR: google-services.json not created!"
            exit 1
          fi

      - name: Create signing.properties
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: |
          cat > android/signing.properties << 'EOF'
          storeFile=${{ secrets.KEYSTORE_PATH }}
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEYSTORE_ALIAS }}
          keyPassword=${{ secrets.KEYSTORE_ALIAS_PASSWORD }}
          EOF

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm run test -- --watch=false --browsers=ChromeHeadless --code-coverage || true

      - name: Build production bundle
        run: npm run build:prod

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build debug APK
        if: github.event.inputs.release_type == 'debug' || github.event_name != 'workflow_dispatch'
        run: |
          cd android
          ./gradlew assembleDebug
          ls -lh app/build/outputs/apk/debug/

      - name: Build release APK
        if: github.event.inputs.release_type == 'release' && github.event_name == 'workflow_dispatch'
        run: |
          cd android
          ./gradlew assembleRelease
          ls -lh app/build/outputs/apk/release/

      - name: Build release Bundle
        if: github.event.inputs.release_type == 'bundle' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/'))
        env:
          KEYSTORE_PATH: ${{ secrets.KEYSTORE_PATH }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
          KEYSTORE_ALIAS_PASSWORD: ${{ secrets.KEYSTORE_ALIAS_PASSWORD }}
        run: |
          cd android
          ./gradlew bundleRelease
          ls -lh app/build/outputs/bundle/release/

      - name: Verify APK signature
        if: github.event.inputs.release_type == 'release' && github.event_name == 'workflow_dispatch'
        run: |
          jarsigner -verify -verbose android/app/build/outputs/apk/release/app-release.apk
          if [ $? -eq 0 ]; then
            echo "✓ APK signature verified"
          else
            echo "✗ APK signature verification failed"
            exit 1
          fi

      - name: Upload APK to Firebase App Distribution
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && !startsWith(github.ref, 'refs/tags/v0')
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          npm install -g firebase-tools
          VERSION=${GITHUB_REF#refs/tags/}
          firebase appdistribution:distribute \
            android/app/build/outputs/apk/release/app-release.apk \
            --app=${{ secrets.FIREBASE_APP_ID }} \
            --release-notes="Release $VERSION\n\nSee CHANGELOG.md for details" \
            --test-groups="internal-testers,beta-testers"

      - name: Generate build report
        if: always()
        run: |
          echo "## Build Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Build Date: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "- Branch/Tag: ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- Node Version: ${{ env.NODE_VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- Java Version: ${{ env.JAVA_VERSION }}" >> $GITHUB_STEP_SUMMARY

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-outputs
          path: |
            android/app/build/outputs/apk/debug/
            android/app/build/outputs/apk/release/
            android/app/build/outputs/bundle/release/
          retention-days: 30
          if-no-files-found: ignore

      - name: Notify on failure
        if: failure()
        run: |
          echo "## ❌ Build Failed" >> $GITHUB_STEP_SUMMARY
          echo "Check the logs above for details" >> $GITHUB_STEP_SUMMARY
