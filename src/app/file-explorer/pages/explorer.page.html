<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button *ngIf="selectionMode$ | async" (click)="clearSelection()">
        Cancel
      </ion-button>

      <ion-menu-button *ngIf="!(selectionMode$ | async)"></ion-menu-button>
    </ion-buttons>

    <ion-title>
      <ng-container *ngIf="(selectionMode$ | async); else normalTitle">
        {{ selectedCount$ | async }} selected
      </ng-container>

      <ng-template #normalTitle> File Explorer </ng-template>
    </ion-title>

    <ion-buttons slot="end">
      <ion-button fill="clear">
        <ion-icon name="search-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>

  <!-- Breadcrumb placeholder (logic later) -->
  <ion-toolbar class="breadcrumb-bar">
    <ion-label class="breadcrumb-text"> {{ currentPath$ | async }} </ion-label>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-list lines="full">
    <ion-item
      #fileItem
      *ngFor="let item of (files$ | async)"
      class="file-item ion-activatable"
      [class.selected]="item.selected"
  [class.selection-mode]="selectionMode$ | async"
      (click)="open(item)"
    >
      <ion-ripple-effect></ion-ripple-effect>

      <!-- Leading Icon (Ionic 8 correct icons) -->
      <ion-icon
        slot="start"
        class="file-type-icon"
        [name]="
        item.isFolder
          ? 'folder-outline'
          : item.type === 'audio'
          ? 'musical-notes-outline'
          : item.type === 'video'
          ? 'videocam-outline'
          : 'document-outline'
      "
      ></ion-icon>

      <!-- File Info -->
      <ion-label>
        <h2 class="file-name">{{ item.name }}</h2>
        <p class="file-meta">{{ item.isFolder ? 'Folder' : item.meta }}</p>
      </ion-label>

      <!-- Selection Checkbox -->
<ion-checkbox
  *ngIf="selectionMode$ | async"
  slot="end"
  [checked]="item.selected"
  (ionClick)="$event.stopPropagation(); toggleSelection(item)"
></ion-checkbox>

      <!-- Chevron -->
      <ion-icon
  *ngIf="!(selectionMode$ | async)"
  slot="end"
  name="chevron-forward-outline"
  color="medium"
></ion-icon>
    </ion-item>
  </ion-list>
</ion-content>

<!-- Selection Action Bar -->
<ion-footer *ngIf="hasSelection$ | async">
  <ion-toolbar color="light">
    <ion-buttons slot="start">
      <ion-button (click)="clearSelection()"> Cancel </ion-button>
    </ion-buttons>

    <ion-buttons slot="end">
      <ion-button>Move</ion-button>
      <ion-button>Copy</ion-button>
      <ion-button color="danger" (click)="deleteSelected()">
        Delete
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-footer>
