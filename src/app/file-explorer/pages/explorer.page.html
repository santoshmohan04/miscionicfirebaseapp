<ion-header>
  <!-- ================= HEADER ================= -->
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <!-- Back arrow -->
      <ion-button
        *ngIf="isInsideStorage$ | async"
        fill="clear"
        (click)="goBack()"
      >
        <ion-icon name="arrow-back-outline"></ion-icon>
      </ion-button>

      <!-- Hamburger -->
      <ion-menu-button *ngIf="!(isInsideStorage$ | async)"></ion-menu-button>
    </ion-buttons>

    <ion-title class="header-title">
      {{ headerTitle$ | async }}
    </ion-title>

    <ion-buttons slot="end">
      <ion-button fill="clear">
        <ion-icon name="search-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>

  <!-- ================= TABS ================= -->
  <ion-toolbar color="primary">
    <ion-segment
      class="header-segment"
      [value]="viewMode$ | async"
      (ionChange)="changeView($event.detail.value)"
    >
      <ion-segment-button value="category">
        <ion-label>Category</ion-label>
      </ion-segment-button>

      <ion-segment-button value="recent">
        <ion-label>Recent</ion-label>
      </ion-segment-button>

      <ion-segment-button value="local">
        <ion-label>Local</ion-label>
      </ion-segment-button>
    </ion-segment>
  </ion-toolbar>

  <!-- ================= BREADCRUMBS ================= -->
  <ion-toolbar
    class="breadcrumb-bar"
    *ngIf="(breadcrumbs$ | async) as breadcrumbs"
  >
    <ion-buttons *ngIf="breadcrumbs.length > 0">
      <ng-container
        *ngFor="let crumb of breadcrumbs; let i = index; let last = last"
      >
        <ion-button fill="clear" (click)="navigateToCrumb(i)">
          {{ crumb }}
        </ion-button>

        <ion-icon
          *ngIf="!last"
          name="chevron-forward-outline"
          class="breadcrumb-separator"
        ></ion-icon>
      </ng-container>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <!-- ================= LOADING OVERLAY ================= -->
  <div class="loading-overlay" *ngIf="(facade.isLoading$ | async)">
    <ion-spinner name="crescent"></ion-spinner>
    <p *ngIf="facade.currentStorageLoading$ | async as storageName">
      Opening {{ storageName }}...<br>
      <small>Please select a folder in the picker</small>
    </p>
    <p *ngIf="!(facade.currentStorageLoading$ | async)">
      Loading...
    </p>
  </div>

  <!-- ================= CATEGORY GRID ================= -->
  <ng-container *ngIf="(viewMode$ | async) === 'category'; else listView">
    <div class="category-grid">
      <div
        class="category-tile"
        *ngFor="let item of (files$ | async)"
        (click)="open(item)"
      >
        <ion-icon
          class="category-icon"
          [name]="
            item.category === 'pictures' ? 'image-outline' :
            item.category === 'audio' ? 'musical-notes-outline' :
            item.category === 'video' ? 'videocam-outline' :
            item.category === 'documents' ? 'document-text-outline' :
            item.category === 'zip' ? 'archive-outline' :
            item.category === 'apps' ? 'apps-outline' :
            'folder-outline'
          "
        ></ion-icon>

        <div class="category-name">{{ item.name }}</div>
      </div>
    </div>
  </ng-container>

  <!-- ================= LIST VIEW ================= -->
  <ng-template #listView>
    <ion-list lines="full">
      <ion-item
        #fileItem
        *ngFor="let item of (files$ | async)"
        class="file-item ion-activatable"
        [class.selected]="item.selected"
        [class.loading-item]="(facade.currentStorageLoading$ | async) === item.name"
        [button]="!(facade.isLoading$ | async)"
        [disabled]="facade.isLoading$ | async"
        (click)="open(item)"
      >
        <ion-ripple-effect></ion-ripple-effect>

        <ion-icon
          slot="start"
          class="file-type-icon"
          [name]="
            item.isFolder ? 'folder-outline' :
            item.type === 'audio' ? 'musical-notes-outline' :
            item.type === 'video' ? 'videocam-outline' :
            'document-outline'
          "
        ></ion-icon>

        <ion-label>
          <h2 class="file-name">{{ item.name }}</h2>
          <p class="file-meta">{{ item.meta }}</p>
        </ion-label>

        <!-- Checkbox only if selectable -->
        <ion-checkbox
          *ngIf="(selectionMode$ | async) && item.selectable"
          slot="end"
          [checked]="item.selected"
          (click)="$event.stopPropagation(); toggleSelection(item)"
        ></ion-checkbox>

        <!-- Chevron when not selecting -->
        <ion-icon
          *ngIf="!(selectionMode$ | async)"
          slot="end"
          name="chevron-forward-outline"
          color="medium"
        ></ion-icon>
      </ion-item>
    </ion-list>
  </ng-template>
</ion-content>

<!-- ================= FOOTER ACTIONS ================= -->
<ion-footer
  *ngIf="
    ((selectionMode$ | async) || (clipboard$ | async)) &&
    (viewMode$ | async) !== 'category' &&
    (viewMode$ | async) !== 'recent'
  "
>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button *ngIf="(selectionMode$ | async)" (click)="clearSelection()">Cancel</ion-button>
    </ion-buttons>

    <ion-buttons slot="end">
      <!-- Selection mode buttons -->
      <ng-container *ngIf="(selectionMode$ | async)">
        <ion-button
          [disabled]="!(hasAnySelection$ | async)"
          (click)="move()"
        >
          Move
        </ion-button>

        <ion-button
          [disabled]="!(hasAnySelection$ | async)"
          (click)="copy()"
        >
          Copy
        </ion-button>

        <ion-button
          color="danger"
          [disabled]="!(hasAnySelection$ | async)"
          (click)="deleteSelected()"
        >
          Delete
        </ion-button>
      </ng-container>

      <!-- Paste mode button -->
      <ng-container *ngIf="(clipboard$ | async) && !(selectionMode$ | async)">
        <ion-button (click)="paste()">
          <ion-icon name="clipboard-outline"></ion-icon>
          Paste
        </ion-button>
      </ng-container>
    </ion-buttons>
  </ion-toolbar>
</ion-footer>
